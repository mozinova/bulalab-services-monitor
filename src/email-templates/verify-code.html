<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body style="margin:0;padding:0;background:#f5f5f5;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
    <tr><td align="center" style="padding:40px 16px">
      <table role="presentation" width="480" cellpadding="0" cellspacing="0" style="background:#fff;border-radius:16px;overflow:hidden">
        <tr><td style="padding:32px">
          <h1 style="margin:0 0 8px;font-size:20px;color:#111">Verify your email</h1>
          <p style="margin:0 0 24px;font-size:14px;color:#666">Use the code below to subscribe to status updates.</p>
          <div style="background:#f5f5f5;border-radius:12px;padding:16px;text-align:center;margin-bottom:24px">
            <span style="font-size:32px;font-weight:700;letter-spacing:8px;color:#111;font-family:monospace">{{ code }}</span>
          </div>
          <p style="margin:0;font-size:12px;color:#888">This code expires in 15 minutes.</p>
        </td></tr>
        <tr><td style="padding:16px 32px;border-top:1px solid #eee">
          <p style="margin:0;font-size:11px;color:#999">&copy; {{ year }} BulaLab</p>
        </td></tr>
      </table>
    </td></tr>
  </table>
</body>
</html>
