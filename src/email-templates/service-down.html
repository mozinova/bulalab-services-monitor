<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body style="margin:0;padding:0;background:#f5f5f5;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
    <tr><td align="center" style="padding:40px 16px">
      <table role="presentation" width="480" cellpadding="0" cellspacing="0" style="background:#fff;border-radius:16px;overflow:hidden">
        <tr><td style="height:4px;background:#ef4444" colspan="2"></td></tr>
        <tr><td style="padding:32px">
          <div style="width:40px;height:40px;border-radius:10px;background:#fef2f2;display:flex;align-items:center;justify-content:center;margin-bottom:16px">
            <span style="font-size:20px">&#9888;</span>
          </div>
          <h1 style="margin:0 0 4px;font-size:20px;color:#111">{{ service_name }} is down</h1>
          <p style="margin:0 0 20px;font-size:14px;color:#888">{{ started_at }}</p>
          <div style="background:#fef2f2;border-radius:12px;padding:12px 16px;margin-bottom:20px">
            <p style="margin:0;font-size:13px;color:#dc2626;font-family:monospace">{{ error }}</p>
          </div>
          <p style="margin:0;font-size:13px;color:#666">We're investigating. You'll be notified when it's resolved.</p>
        </td></tr>
        <tr><td style="padding:16px 32px;border-top:1px solid #eee">
          <p style="margin:0;font-size:11px;color:#999">&copy; {{ year }} BulaLab</p>
        </td></tr>
      </table>
    </td></tr>
  </table>
</body>
</html>
